<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OpenStoryflow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ===== Top bar ===== -->
<header id="topbar">
  <div class="tb-left">
    <span id="app-title"><span class="spark" data-icon="sparkles"></span>OpenStoryflow</span>
    <select id="project-select" title="Project"></select>
    <button id="btn-new-project" class="icon-btn" title="New project" data-icon="plus"></button>
    <span id="breadcrumb"></span>
  </div>
  <div class="tb-right">
    <button id="btn-tactics" class="tb-btn" data-icon="book-open">Tactics</button>
    <button id="btn-templates" class="tb-btn" data-icon="layout-template">Templates</button>
    <button id="btn-docs" class="tb-btn" data-icon="file-text">Docs</button>
    <button id="btn-export" class="tb-btn" data-icon="download">Export</button>
    <button id="btn-help" class="tb-btn icon-only" title="Help & shortcuts" data-icon="circle-help"></button>
    <button id="btn-settings" class="tb-btn icon-only" title="Settings" data-icon="settings"></button>
  </div>
</header>

<!-- ===== Board tabs ===== -->
<div id="board-tabs"></div>

<!-- ===== Left toolbar ===== -->
<nav id="toolbar">
  <button data-tool="select" class="tool active" title="Select (V) — drag empty canvas to select" data-icon="mouse-pointer-2"></button>
  <button data-tool="hand" class="tool" title="Hand / pan (H or hold Space)" data-icon="hand"></button>
  <hr>
  <button data-tool="note" class="tool" title="Note (N) — or double-click the canvas" data-icon="sticky-note"></button>
  <button data-tool="link" class="tool" title="Link (L)" data-icon="link"></button>
  <button data-tool="todo" class="tool" title="To-do (T)" data-icon="list-checks"></button>
  <button data-tool="wall" class="tool" title="Wall / section (W)" data-icon="frame"></button>
  <button data-tool="folder" class="tool" title="Folder — nested canvas (F)" data-icon="folder"></button>
  <button data-tool="comment" class="tool" title="Comment (C)" data-icon="message-circle"></button>
  <button data-tool="aiimage" class="tool" title="AI Image (G)" data-icon="sparkles"></button>
  <button data-tool="sketch" class="tool" title="Sketch / pen (S)" data-icon="pen-line"></button>
  <button data-tool="connect" class="tool" title="Connect cards with an arrow (A)" data-icon="arrow-up-right"></button>
  <hr>
  <button id="btn-eyedropper" class="tool" title="Eye dropper (I)" data-icon="pipette"></button>
</nav>

<!-- ===== Canvas ===== -->
<main id="canvas">
  <div id="world">
    <svg id="edges" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
          <path d="M0,0 L8,4 L0,8 z" fill="#9aa4b2"></path>
        </marker>
      </defs>
      <g id="edge-layer"></g>
      <g id="sketch-layer"></g>
    </svg>
    <div id="items"></div>
  </div>
  <div id="rubber-band" hidden></div>
  <div id="align-bar" hidden>
    <button data-align="row" title="Align in a row">⇥</button>
    <button data-align="col" title="Align in a column">⤓</button>
    <button data-align="grid" title="Arrange as grid">▦</button>
    <button data-align="dist-h" title="Distribute horizontally">↔</button>
    <button data-align="dist-v" title="Distribute vertically">↕</button>
  </div>
  <div id="zoom-controls">
    <button id="zoom-out" title="Zoom out (⌘−)" data-icon="zoom-out"></button>
    <button id="zoom-pct" title="Reset to 100%">100%</button>
    <button id="zoom-in" title="Zoom in (⌘+)" data-icon="zoom-in"></button>
    <button id="zoom-fit" title="Zoom to fit (⌘0)" data-icon="maximize"></button>
  </div>
</main>

<!-- ===== AI chat bar (board-level) ===== -->
<footer id="ai-bar">
  <div id="ai-log" hidden></div>
  <div id="mention-menu" hidden></div>
  <div id="ai-input-row">
    <span id="ai-spark" data-icon="sparkles"></span>
    <textarea id="ai-input" rows="1" placeholder="Ask anything — AI builds and edits the board. Type @ to mention a Tactic, Doc or card…"></textarea>
    <select id="ai-style" title="Response style">
      <option value="default">Default</option>
      <option value="creative">Creative</option>
      <option value="concise">Concise</option>
      <option value="detailed">Detailed</option>
    </select>
    <button id="ai-toggle-log" title="Show/hide conversation" data-icon="message-square-text"></button>
    <span id="ai-kbd"><kbd>⌘</kbd><kbd>K</kbd></span>
    <button id="ai-send" title="Send" data-icon="send-horizontal"></button>
  </div>
</footer>

<!-- ===== Side drawer (tactics / templates / docs) ===== -->
<aside id="drawer" hidden>
  <div id="drawer-head">
    <span id="drawer-title"></span>
    <button id="drawer-close" class="icon-btn">✕</button>
  </div>
  <div id="drawer-body"></div>
</aside>

<!-- ===== Generic modal ===== -->
<div id="modal-backdrop" hidden>
  <div id="modal">
    <div id="modal-head"><span id="modal-title"></span><button id="modal-close" class="icon-btn">✕</button></div>
    <div id="modal-body"></div>
  </div>
</div>

<!-- ===== Context menu ===== -->
<div id="ctx-menu" hidden></div>

<!-- ===== Toast ===== -->
<div id="toast" hidden></div>

<script src="js/vendor-html-to-image.js"></script>
<script src="js/icons.js"></script>
<script src="js/platform.js"></script>
<script src="js/data.js"></script>
<script src="js/canvas.js"></script>
<script src="js/app.js"></script>
</body>
</html>
